    <!-- Your Custom React App Logo (Favicon) -->

    <!-- Mobile Responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->

    <meta property="og:url" content="https://barterverse.in/">

    <!-- Twitter Specific Tags (Uses the same OG image) -->
